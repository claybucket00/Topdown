<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>2D Replay</title>
        <link rel="stylesheet" href="renderer.css">
    </head>
    <body>
        <div class="main-layout">
            <!-- Left sidebar for CT equipment -->
            <div class="sidebar sidebar-left">
                <div class="team-header ct">CT</div>
                <div class="players-container" id="ct-players"></div>
            </div>

            <!-- Center area with canvas -->
            <div class="center-area">
                <div class="canvas-container">
                    <canvas id="map"></canvas>
                </div>
            </div>

            <!-- Right sidebar for T equipment -->
            <div class="sidebar sidebar-right">
                <div class="team-header t">T</div>
                <div class="players-container" id="t-players"></div>
            </div>
        </div>

        <!-- Bottom replay bar -->
        <div class="replay-bar">
            <div class="replay-controls">
                <button id="play-pause-btn" class="play-pause-btn" title="Play/Pause">⏸</button>
                <input type="range" id="replay-progress" class="progress-slider" min="0" max="100" value="0">
            </div>
            <div class="time-display">
                <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
            </div>
        </div>

        <script src="renderer.js"></script>
    </body>
</html>
